AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Imperium - Multiplayer card game backend (WebSocket + Lambda + DynamoDB)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Layers:
      - !Ref SharedLayer
    Environment:
      Variables:
        GAMES_TABLE: !Ref GamesTable
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        WEBSOCKET_ENDPOINT: !Sub "https://${ImperiumWebSocket}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  # ── WebSocket API ─────────────────────────────────────────────────────────
  ImperiumWebSocket:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: ImperiumWebSocket
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ImperiumWebSocket
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub "integrations/${ConnectIntegration}"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ImperiumWebSocket
      RouteKey: $disconnect
      Target: !Sub "integrations/${DisconnectIntegration}"

  CreateRoomRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ImperiumWebSocket
      RouteKey: createRoom
      Target: !Sub "integrations/${CreateRoomIntegration}"

  JoinRoomRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ImperiumWebSocket
      RouteKey: joinRoom
      Target: !Sub "integrations/${JoinRoomIntegration}"

  StartGameRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ImperiumWebSocket
      RouteKey: startGame
      Target: !Sub "integrations/${StartGameIntegration}"

  PlayCardRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ImperiumWebSocket
      RouteKey: playCard
      Target: !Sub "integrations/${PlayCardIntegration}"

  GetGameRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ImperiumWebSocket
      RouteKey: getGame
      Target: !Sub "integrations/${GetGameIntegration}"

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      [
        ConnectRoute,
        DisconnectRoute,
        CreateRoomRoute,
        JoinRoomRoute,
        StartGameRoute,
        PlayCardRoute,
        GetGameRoute,
      ]
    Properties:
      ApiId: !Ref ImperiumWebSocket

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ImperiumWebSocket
      DeploymentId: !Ref WebSocketDeployment
      StageName: !Ref Stage

  # ── Integrations ──────────────────────────────────────────────────────────
  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ImperiumWebSocket
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ConnectFunction.Arn}/invocations"

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ImperiumWebSocket
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DisconnectFunction.Arn}/invocations"

  CreateRoomIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ImperiumWebSocket
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateRoomFunction.Arn}/invocations"

  JoinRoomIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ImperiumWebSocket
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${JoinRoomFunction.Arn}/invocations"

  StartGameIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ImperiumWebSocket
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${StartGameFunction.Arn}/invocations"

  PlayCardIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ImperiumWebSocket
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PlayCardFunction.Arn}/invocations"

  GetGameIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ImperiumWebSocket
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetGameFunction.Arn}/invocations"

  # ── Shared Layer ──────────────────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: imperium-shared
      ContentUri: layers/shared/
      CompatibleRuntimes: [nodejs20.x]
    Metadata:
      BuildMethod: makefile

  # ── Lambda Functions ──────────────────────────────────────────────────────
  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/connect/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/disconnect/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/${Stage}/*"

  CreateRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/createRoom/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/${Stage}/*"

  JoinRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/joinRoom/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/${Stage}/*"

  StartGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/startGame/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/${Stage}/*"

  PlayCardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/playCard/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GamesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/${Stage}/*"

  GetGameFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/getGame/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref GamesTable
        - Statement:
            Effect: Allow
            Action: execute-api:ManageConnections
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/${Stage}/*"

  # ── Lambda Permissions ────────────────────────────────────────────────────
  ConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ConnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/*"

  DisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref DisconnectFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/*"

  CreateRoomPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref CreateRoomFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/*"

  JoinRoomPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref JoinRoomFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/*"

  StartGamePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StartGameFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/*"

  PlayCardPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PlayCardFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/*"

  GetGamePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref GetGameFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ImperiumWebSocket}/*"

  # ── DynamoDB Tables ───────────────────────────────────────────────────────
  GamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "imperium-games-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: gameId
          AttributeType: S
      KeySchema:
        - AttributeName: gameId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "imperium-connections-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

Outputs:
  WebSocketURL:
    Description: "WebSocket URL — paste this in your React frontend"
    Value: !Sub "wss://${ImperiumWebSocket}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
    Export:
      Name: !Sub "ImperiumWebSocketURL-${Stage}"

  GamesTableName:
    Value: !Ref GamesTable

  ConnectionsTableName:
    Value: !Ref ConnectionsTable
